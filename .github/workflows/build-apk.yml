name: Generate Android APK

on:
  workflow_dispatch: # 畀你隨時手動點擊「一鍵生成」

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Web To APK
        uses: wajahatkarim3/webview-apk-action@v1
        with:
          # 【請將下面改做你嘅 GitHub 網頁網址】
          app_url: "https://yourusername.github.io/your-repo/"
          # 你個 App 嘅名（可以用英文）
          app_name: "MyGitHubApp"
          # 包名（通常係反向網址，例如 com.你的名字.你的app名）
          package_name: "com.example.mygithubapp"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-apk
          path: ./**/*.apk
