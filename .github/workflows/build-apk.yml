name: Generate Android APK

on:
  workflow_dispatch: # 畀你隨時手動點擊「一鍵生成」

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用專門打包本地 HTML 檔案嘅穩定工具
      - name: Convert Web App to APK
        uses: jonasmerlin/webapp-to-apk@v2
        with:
          # 填寫你 App 嘅內部 ID（用全小寫英文，格式如 com.作者名.app名）
          appId: "com.matgr557ui.biblewebapp"
          # 你手機 App 顯示出嚟嘅名
          appName: "Bible Web App"
          # 核心設定：點（.）代表直接讀取你根目錄嘅 index.html
          webAppDir: "."
